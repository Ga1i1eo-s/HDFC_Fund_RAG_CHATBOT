services:
  - type: web
    name: hdfc-fund-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.phase_3_3_api.app:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROMA_TENANT
        value: "default_tenant" # You will override this in the dashboard
      - key: CHROMA_DATABASE
        value: "default_database" # You will override this in the dashboard
      - key: CHROMA_CLOUD_API_KEY
        sync: false # You must set this in the dashboard secretly
      - key: GROQ_API_KEY
        sync: false # You must set this in the dashboard secretly
